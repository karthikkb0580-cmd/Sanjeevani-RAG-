# =============================================================================
# Sanjeevani AI – RAG Service docker-compose.yml
# =============================================================================

version: "3.9"

services:

  # ── Qdrant Vector Database ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: sanjeevani_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── RAG Service ──────────────────────────────────────────────────────────────
  rag-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: sanjeevani_rag
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - UPLOAD_DIR=/tmp/rag_uploads
    volumes:
      - upload_tmp:/tmp/rag_uploads
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  qdrant_storage:
    driver: local
  upload_tmp:
    driver: local
